{% extends "syncope/base.html" %}

{% block title %}Delete Member{% endblock %}

{% block content %}
<h2>Delete Member?</h2>

<p>Are you sure you want to delete <strong>{{ person.first_name }} {{ person.last_name }}</strong>?</p>

{% if is_admin %}
<form method="post">
    {% csrf_token %}
    <button type="submit" class="danger">Delete</button>
    <a href="{{ person_detail_url }}">Cancel</a>
</form>
{% else %}
<p><a href="{{ person_detail_url }}">Back to Member</a></p>
{% endif %}

{% endblock %}
