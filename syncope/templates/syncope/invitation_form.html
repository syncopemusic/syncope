{% extends "syncope/base.html" %}
{% block title %}New Invitation{% endblock %}

{% block content %}
<h2>New Invitation</h2>

{% if is_org %}
<p>
    <a href="{% url 'syncope:org_member_new' url_username %}?next={{ request.get_full_path|urlencode }}">
        <button type="button">+ Create New Person</button>
    </a>
</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
</form>
{% endblock %}
