{% extends "syncope/base.html" %}
{% block title %}New Invitation{% endblock %}

{% block content %}
<h2>New Invitation</h2>

{% if is_org %}
<p>
    <a href="{% url 'syncope:org_member_new' url_username %}">+ create a new org person</a>
</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
</form>
{% endblock %}
