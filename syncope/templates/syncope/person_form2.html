{% extends "syncope/base.html" %}

{% block title %}Update{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Update Your Profile</h2>
</div>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Profile</button>
    <a href="{% url 'syncope:home' %}" class="btn btn-link" style="margin-left: 0.5rem;">Cancel</a>
</form>
{% endblock %}
